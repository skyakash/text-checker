# Log rotation for bare-metal deployments that redirect stdout to a file.
# Install: sudo cp deploy/logrotate.conf /etc/logrotate.d/text-checker
#
# Only needed for systemd bare-metal. Docker deployments use json-file
# driver with max-size/max-file set in docker-compose.prod.yml.

/var/log/text-checker/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
